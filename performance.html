<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Class Performance</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="theme-color" content="#3b82f6">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔒 SECURITY GUARD SANG PAGE (I-check dayon kon naka-login, kung wala kick out dayon sa login)
        if (!localStorage.getItem('access_token') || !localStorage.getItem('user_id')) {
            window.location.replace('login.html');
        }

        // Anti-flash theme script
        if (localStorage.getItem('dashboard_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <style>
        :root {
            --sidebar-bg: #111827;
            --main-bg: #eef2ff;
            --accent-blue: #3b82f6;
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-muted: #6b7280;
            --border-color: #f1f5f9;
            --input-bg: #f8faff;
            --modal-border: #ddd;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --hover-bg: #f3f4f6;
        }

        [data-theme="dark"] {
            --sidebar-bg: #0b0f19;
            --main-bg: #111827;
            --card-bg: #1f2937;
            --text-dark: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --input-bg: #374151;
            --modal-border: #4b5563;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --hover-bg: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { background-color: var(--main-bg); transition: background-color 0.3s; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--main-bg); color: var(--text-dark); 
            overflow-x: hidden; transition: background-color 0.3s, color 0.3s;
        }

        .layout { display: flex; min-height: 100vh; width: 100%; }
        
        .sidebar {
            width: 260px; background-color: var(--sidebar-bg); color: white; padding: 25px 0; 
            position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1001; 
            transition: transform 0.3s ease-in-out, background-color 0.3s;
        }

        .sidebar-top { padding: 0 20px 30px; text-align: center; }

        .sidebar-profile { display: flex; justify-content: center; margin-bottom: 15px; }
        .profile-container { position: relative; display: inline-block; cursor: pointer; }
        .profile-overlay { position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px; border-radius: 50%; background: rgba(0, 0, 0, 0.6); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; font-size: 0.75rem; font-weight: 600; }
        .profile-container:hover .profile-overlay { opacity: 1; }
        .sidebar-profile img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(59, 130, 246, 0.5); padding: 3px; background-color: var(--sidebar-bg); transition: 0.3s ease; }
        .profile-container:hover img { border-color: var(--accent-blue); transform: scale(1.05); }

        .sidebar-top h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .sidebar-username { font-size: 0.85rem; color: #9ca3af; }

        .sidebar-menu { list-style: none; flex-grow: 1; padding: 0 15px; overflow-y: auto; }
        .sidebar-menu li { margin-bottom: 5px; }
        .sidebar-menu a { display: flex; align-items: center; color: #9ca3af; text-decoration: none; padding: 12px 15px; border-radius: 8px; font-size: 0.9rem; transition: all 0.3s; }
        .sidebar-menu a i, .sidebar-menu a svg { width: 18px; height: 18px; margin-right: 12px; }
        .sidebar-menu a:hover:not(.active) { background: rgba(255, 255, 255, 0.05); color: white; }
        .sidebar-menu a.active { background-color: var(--accent-blue); color: white; }

        .sidebar-footer { padding: 0 15px; }
        .logout-btn, .theme-btn { display: flex; align-items: center; color: var(--text-muted); text-decoration: none; padding: 12px 15px; border-radius: 10px; font-size: 0.95rem; transition: 0.2s; cursor: pointer; border: none; background: none; width: 100%; }
        .logout-btn:hover, .theme-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .logout-btn svg, .theme-btn i { width: 20px; margin-right: 15px; font-size: 1.1rem; }

        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; opacity: 0; transition: opacity 0.3s ease-in-out; }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .main-content { 
            margin-left: 260px; flex-grow: 1; min-width: 0; padding: 30px 30px 100px 30px; 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease-in-out; 
            opacity: 0; animation: fadeInContent 0.25s ease-out forwards; 
        }

        @keyframes fadeInContent {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .main-content.page-leave {
            opacity: 0 !important;
            transform: translateY(10px);
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
        }

        .topbar { margin-bottom: 30px; width: 100%; display: flex; align-items: center; }
        .topbar-header { display: flex; align-items: center; width: 100%; }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: var(--text-dark); cursor: pointer; margin-right: 15px; }

        .search-container { position: relative; max-width: 450px; margin-bottom: 30px; }
        .search-container input { width: 100%; padding: 14px 15px 14px 45px; border: 1px solid var(--border-color); border-radius: 10px; outline: none; font-size: 0.95rem; font-family: 'Inter', sans-serif; background: var(--input-bg); color: var(--text-dark); box-shadow: 0 2px 4px var(--shadow-color); transition: background 0.3s, color 0.3s, border 0.3s; }
        .search-container input:focus { border-color: var(--accent-blue); background: var(--card-bg); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .sections-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
        }

        .no-match-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-muted);
            padding: 50px 20px;
            grid-column: 1 / -1;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }
        .no-match-message svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px 30px;
            border-left: 6px solid var(--accent-blue);
            box-shadow: 0 4px 6px -1px var(--shadow-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            height: 100%;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
        }
        .section-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px var(--shadow-color); }
        .section-title { font-size: 1.6rem; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
        .section-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 15px; line-height: 1.4; }
        
        .tags-wrapper { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .tag-students { background: #dcfce7; color: #166534; }
        .tag-room { background: #fef9c3; color: #b45309; }
        .tag-sem { background: #e0e7ff; color: #3730a3; }

        .card-actions {
            display: flex;
            flex-direction: row;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .menu-container { position: relative; display: flex; justify-content: flex-start; }
        .three-dots-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; border-radius: 50%; transition: background 0.2s, color 0.2s; display: flex; align-items: center; justify-content: center; }
        .three-dots-btn:hover { background: var(--hover-bg); color: var(--text-dark); }
        
        .dropdown-menu { display: none; position: absolute; left: 0; top: 40px; background: var(--card-bg); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 140px; z-index: 10; border: 1px solid var(--border-color); overflow: hidden; transition: background 0.3s; }
        .dropdown-menu.show { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .dropdown-item { width: 100%; text-align: left; padding: 12px 15px; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-family: 'Inter', sans-serif; color: var(--text-dark); transition: background 0.2s; }
        .dropdown-item i, .dropdown-item svg { width: 16px; height: 16px; }
        .dropdown-item:hover { background: var(--hover-bg); }
        .dropdown-item.delete { color: #ef4444; }
        .dropdown-item.delete:hover { background: #fef2f2; color: #dc2626; }
        [data-theme="dark"] .dropdown-item.delete:hover { background: #451a1a; color: #ef4444; }

        .view-btn { background: var(--accent-blue); color: white; border: none; padding: 8px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .view-btn:hover { background: #2563eb; }

        .fab-add-btn { position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--accent-blue); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 9998; transition: transform 0.3s; border: none; }
        .fab-add-btn:hover { transform: scale(1.1); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); color: var(--text-dark); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; margin: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transition: background 0.3s; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--modal-border); border-radius: 8px; outline: none; font-family: 'Inter', sans-serif; background: var(--input-bg); color: var(--text-dark); }

        .toast-notification { visibility: hidden; min-width: 280px; background-color: #10b981; color: #fff; text-align: left; border-radius: 8px; padding: 16px 20px; position: fixed; z-index: 10000; right: 30px; top: 20px; font-size: 0.95rem; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.15); opacity: 0; transform: translateY(-20px); transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s; display: flex; align-items: center; gap: 12px; }
        .toast-notification.show { visibility: visible; opacity: 1; transform: translateY(0); }

        .ai-floating-btn { position: fixed; bottom: 120px; right: 40px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--accent-blue); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 9998; transition: transform 0.3s; border: none; }
        .ai-floating-btn:hover { transform: scale(1.1); }
        .ai-chat-widget { position: fixed; bottom: 190px; right: 40px; width: 350px; height: 450px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px var(--shadow-color); display: flex; flex-direction: column; z-index: 9999; transform: scale(0); transform-origin: bottom right; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s; overflow: hidden; border: 1px solid var(--border-color); }
        .ai-chat-widget.active { transform: scale(1); }
        .ai-chat-header { background: linear-gradient(-45deg, #3b82f6, #6366f1); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .ai-chat-body { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: var(--input-bg); }
        .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .chat-msg.user { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-msg.ai { background: var(--card-bg); color: var(--text-dark); align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px var(--shadow-color); border: 1px solid var(--border-color); }
        .ai-chat-input-area { padding: 15px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .ai-chat-input-area input { flex-grow: 1; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; outline: none; font-size: 0.9rem; font-family: 'Inter', sans-serif; background: var(--input-bg); color: var(--text-dark); }
        .ai-chat-input-area button { background: #3b82f6; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        @media (max-width: 1200px) {
            .sections-wrapper { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
            .main-content { margin-left: 0; padding: 20px 20px 100px 20px; width: 100vw; }
            .topbar-header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; }
            .menu-toggle { display: block; position: absolute; left: 0; }
        }

        @media (max-width: 768px) {
            .sections-wrapper { grid-template-columns: 1fr; }
            .fab-add-btn { bottom: 20px; right: 20px; }
            .ai-floating-btn { bottom: 90px; right: 20px; }
            .ai-chat-widget { width: calc(100% - 40px); right: 20px; bottom: 160px; }
            .toast-notification { right: 20px; left: 20px; min-width: auto; top: 20px; }
        }
    </style>
</head>

<script>
    /* =========================================
       THEME TOGGLE LOGIC
       ========================================= */
    function toggleTheme() {
        const root = document.documentElement;
        const icon = document.getElementById('themeIcon');
        const text = document.getElementById('themeText');
        
        if (root.getAttribute('data-theme') === 'dark') {
            root.removeAttribute('data-theme');
            localStorage.setItem('dashboard_theme', 'light');
            if(icon) icon.className = 'fa-solid fa-moon';
            if(text) text.textContent = 'Dark Mode';
        } else {
            root.setAttribute('data-theme', 'dark');
            localStorage.setItem('dashboard_theme', 'dark');
            if(icon) icon.className = 'fa-solid fa-sun';
            if(text) text.textContent = 'Light Mode';
        }
    }

    const savedTheme = localStorage.getItem('dashboard_theme');
    if (savedTheme === 'dark') {
        document.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if(icon && text) {
                icon.className = 'fa-solid fa-sun';
                text.textContent = 'Light Mode';
            }
        });
    }

    lucide.createIcons();

    /* =========================================
       SUPABASE CONFIGURATION (MATCHED WITH ATTENDANCE)
       ========================================= */

    // ✅ UPDATED: UPLOAD AVATAR WITH CANVAS COMPRESSION (upsert para safer, consistent sa attendance)
    function uploadAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;

        const userId = localStorage.getItem('user_id');
        const imgElement = document.getElementById('userAvatar');
        if(!imgElement) return;
        
        imgElement.style.opacity = '0.5';

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 150;
                const MAX_HEIGHT = 150;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                try {
                    // ✅ CHANGED: update → upsert (handles missing profile row, same as attendance)
                    const { error } = await supabaseClient
                        .from('profiles')
                        .upsert({ id: userId, avatar_url: compressedBase64 })
                        .select(); 

                    if (error) throw error;

                    imgElement.src = compressedBase64;
                    localStorage.setItem('cached_user_avatar', compressedBase64); 
                    showNotification("Your profile picture has been updated successfully.");
                } catch (err) {
                    console.error("Upload error:", err);
                    showNotification("Error updating picture.", "error");
                } finally {
                    imgElement.style.opacity = '1';
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

        try {

    async function processSmartDBQuery(query) {
        let teacherId = localStorage.getItem('user_id');
        if (!teacherId) return "I'm sorry, but I couldn't verify your account. Please log in again.";

        if (query === 'hi' || query === 'hello' || query === 'hey' || query.includes('good morning') || query.includes('good afternoon')) {
            return "Hello there! How can I assist you with your classes today?";
        }

        const { data: secRes } = await supabaseClient.from('sections').select('*').eq('teacher_id', teacherId);
        const sections = secRes || [];
        
        if (sections.length === 0) return "It appears you haven't set up any active sections yet.";
        
        const sectionIds = sections.map(s => s.id);
        const sectionTitles = sections.map(s => s.title);

        const [studRes, recRes, attRes, schedRes, facRes] = await Promise.all([
            supabaseClient.from('students').select('*').in('section_id', sectionIds),
            supabaseClient.from('class_records').select('*').in('section_id', sectionIds),
            supabaseClient.from('attendance').select('*').in('section', sectionTitles),
            supabaseClient.from('schedules').select('*').eq('user_id', teacherId),
            supabaseClient.from('facilitators').select('*').eq('teacher_id', teacherId)
        ]);

        const students = studRes.data || [];
        const records = recRes.data || [];
        const attendance = attRes.data || [];
        const schedules = schedRes.data || [];
        const facilitators = facRes.data || [];

        const getFinalGrade = (record) => {
            if(!record) return 0;
            let totalWW = 0, totalPT = 0, totalQE = Number(record.qe) || 0;
            for (let key in record) {
                if (key.startsWith('module_') || key.startsWith('activity_')) totalWW += Number(record[key]) || 0;
                if (key.startsWith('pt_')) totalPT += Number(record[key]) || 0;
            }
            let ww_score = Math.min((totalWW / 100) * 100, 100) || 0;
            let pt_score = Math.min((totalPT / 100) * 100, 100) || 0;
            let qe_score = Math.min((totalQE / 50) * 100, 100) || 0;
            return Math.round((ww_score * 0.3) + (pt_score * 0.5) + (qe_score * 0.2));
        };

        if (query.includes('top') || query.includes('highest') || query.includes('best')) {
            if(students.length === 0) return "You don't have any students registered yet.";
            let scoredStudents = students.map(s => {
                let rec = records.find(r => r.student_id === s.id);
                return { name: s.full_name, grade: getFinalGrade(rec), section: sections.find(sec=>sec.id===s.section_id)?.title };
            }).sort((a,b) => b.grade - a.grade).slice(0, 5); 
            
            let res = "<strong>Here are your top performing students:</strong><br><br>";
            scoredStudents.forEach((s, i) => { res += `<strong>#${i+1} ${s.name}</strong> - ${s.grade}% <span style="font-size:0.8rem; color:var(--text-muted);">(${s.section})</span><br>`; });
            return res;
        }
        else if (query.includes('fail') || query.includes('bagsak') || query.includes('below')) {
            let failing = [];
            students.forEach(s => {
                let rec = records.find(r => r.student_id === s.id);
                let grade = getFinalGrade(rec);
                if(grade > 0 && grade < 75) failing.push({ name: s.full_name, grade: grade });
            });
            if(failing.length === 0) return "Excellent news! None of your students are currently failing.";
            let res = "<strong>The following students are currently falling behind (Below 75%):</strong><br><br>";
            failing.forEach(f => res += `- <strong>${f.name}</strong> (${f.grade}%)<br>`);
            return res;
        }
        else if (query.includes('wala') && (query.includes('pasa') || query.includes('module') || query.includes('activity')) || query.includes('missing')) {
            let missingStudents = [];
            records.forEach(r => {
                let hasMissing = false;
                for(let i=1; i<=5; i++) { if(r[`module_${i}`] == null || r[`module_${i}`] === "") hasMissing = true; }
                if(hasMissing) {
                    let stud = students.find(s => s.id === r.student_id);
                    if(stud) missingStudents.push(stud.full_name);
                }
            });
            if(missingStudents.length === 0) return "All students have submitted their recorded modules and activities.";
            return `<strong>The following students have missing requirements:</strong><br><br>- ` + missingStudents.join('<br>- ');
        }
        else if (query.includes('score ni') || query.includes('grade of') || query.includes('grade ni') || query.includes('pasado ba si') || query.includes('nakapasa bala si') || query.includes('score of')) {
            let nameExtracted = query.split(/ni |of |si /)[1]?.replace('?', '').trim();
            if(!nameExtracted) return "Please specify the student's name. Example: <em>'What is the grade of Mark?'</em>";
            
            let stud = students.find(s => s.full_name.toLowerCase().includes(nameExtracted));
            if(!stud) return `I could not find a student named "<strong>${nameExtracted}</strong>" in your class lists.`;
            
            let rec = records.find(r => r.student_id === stud.id);
            if(!rec) return `There are no grade records entered for <strong>${stud.full_name}</strong> yet.`;
            
            let grade = getFinalGrade(rec);
            let status = grade >= 75 ? "<span style='color:#10b981;'>Passing</span>" : "<span style='color:#ef4444;'>Failing</span>";
            return `The current calculated grade for <strong>${stud.full_name}</strong> is <strong>${grade}%</strong>. They are currently ${status}.`;
        }
        else if (query.includes('absent') || query.includes('attendance')) {
            if(attendance.length === 0) return "I couldn't find any attendance records in your lists.";
            let absentCounts = {};
            attendance.forEach(a => { if(a.status === 'Absent') absentCounts[a.student_name] = (absentCounts[a.student_name] || 0) + 1; });
            let sortedAbsents = Object.keys(absentCounts).sort((a,b) => absentCounts[b] - absentCounts[a]);
            if(sortedAbsents.length === 0) return "You have perfect attendance across all classes! No absences recorded.";
            
            let res = "<strong>Attendance Report (Frequently Absent):</strong><br><br>";
            sortedAbsents.slice(0,5).forEach(name => { res += `- <strong>${name}</strong> <span style="color:#ef4444;">(${absentCounts[name]} absences)</span><br>`; });
            return res;
        }
        else if (query.includes('schedule') || query.includes('klase') || query.includes('class')) {
            if(schedules.length === 0) return "You do not have any schedules recorded. Would you like to add one via the Dashboard?";
            let res = "<strong>Here is your current class schedule:</strong><br><br>";
            schedules.forEach(s => { res += `📅 <strong>${s.subject}</strong><br><small>${s.time} | ${s.details}</small><br><br>`; });
            return res;
        }
        else if (query.includes('facilitator') || query.includes('faci')) {
            if(facilitators.length === 0) return "You haven't assigned any facilitators yet.";
            let res = "<strong>Here are your assigned facilitators:</strong><br><br>";
            facilitators.forEach(f => { res += `👤 <strong>${f.full_name}</strong><br><small>Assigned to: ${f.section}</small><br><br>`; });
            return res;
        }
        else if (query.includes('pila ka student') || query.includes('how many students') || query.includes('population')) {
            return `You currently handle a total of <strong>${students.length} students</strong> distributed across <strong>${sections.length} active sections</strong>.`;
        }
        else if (query.includes('id number') || query.includes('id ni') || query.includes('id of')) {
            let nameExtracted = query.split(/ni |of /)[1]?.replace('?', '').trim();
            if(!nameExtracted) return "Please specify the student. Example: <em>'What is the ID number of Kevin?'</em>";
            
            let stud = students.find(s => s.full_name.toLowerCase().includes(nameExtracted));
            if(!stud) return `I couldn't locate "<strong>${nameExtracted}</strong>" in the database.`;
            return `The ID number for <strong>${stud.full_name}</strong> is: <strong>${stud.id}</strong>.`;
        }
        else if (query.includes('summary') || query.includes('overview') || query.includes('performance') || query.includes('kamusta')) {
            let totalStuds = students.length; let passCount = 0;
            records.forEach(r => { if(getFinalGrade(r) >= 75) passCount++; });
            let passRate = totalStuds > 0 ? Math.round((passCount/totalStuds)*100) : 0;
            
            return `<strong>Class Performance Overview:</strong><br><br>` + 
                   `• Total Active Sections: <strong>${sections.length}</strong><br>` +
                   `• Total Handled Students: <strong>${totalStuds}</strong><br>` +
                   `• Overall Passing Rate: <strong>${passRate}%</strong><br><br>` +
                   `<em>Tip: You can ask me to list down the top students or those who are failing.</em>`;
        }
        return `I am your Virtual Teaching Assistant. Here are some things I can help you with:<br><br>
                💬 <em>"Who are the top students?"</em><br>
                💬 <em>"What is the grade of [Student Name]?"</em><br>
                💬 <em>"Who has missing modules?"</em><br>
                💬 <em>"Who is frequently absent?"</em><br>
                💬 <em>"What is my current schedule?"</em><br>
                💬 <em>"Give me a class summary."</em>`;
    }

    const sectionsWrapper = document.getElementById('sectionsWrapper');

    async function loadSections() {
        const userId = localStorage.getItem('user_id');
        if (!userId) return;

        sectionsWrapper.innerHTML = ''; 
        document.getElementById('noMatchMessage').style.display = 'none';

        const { data: savedSections, error } = await supabaseClient
            .from('sections')
            .select('*, students(count)') 
            .eq('teacher_id', userId)
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading sections:", error);
            showNotification("Failed to load sections", "error");
            return;
        }

        if (!savedSections || savedSections.length === 0) {
            sectionsWrapper.innerHTML = '<p style="color: var(--text-muted); font-size: 0.95rem; grid-column: 1 / -1; text-align: center; margin-top: 20px;">No sections added yet. Click the + button to add one.</p>';
            return;
        }

        savedSections.forEach((sec) => {
            const card = document.createElement('div');
            card.className = 'section-card';
            
            const secData = encodeURIComponent(JSON.stringify(sec)); 
            const studentCount = (sec.students && sec.students[0] && sec.students[0].count) ? sec.students[0].count : 0;
            const sem = sec.semester || '1st Sem';
            
            card.innerHTML = `
                <div>
                    <h2 class="section-title">${sec.title}</h2>
                    <p class="section-subtitle">${sec.subject}</p>
                    <div class="tags-wrapper">
                        <span class="tag tag-students"><i data-lucide="user"></i> ${studentCount} Students</span>
                        <span class="tag tag-room"><i data-lucide="building"></i> ${sec.room}</span>
                        <span class="tag tag-sem"><i data-lucide="calendar"></i> ${sem}</span>
                        <span class="tag" style="background:#fce7f3; color:#9d174d;">
    <i data-lucide="graduation-cap"></i> ${sec.school_year || 'N/A'}
</span>
                    </div>
                </div>
                <div class="card-actions">
                    <div class="menu-container">
                        <button class="three-dots-btn" onclick="toggleDropdown(event, '${sec.id}')">
                            <i data-lucide="more-vertical"></i>
                        </button>
                        <div class="dropdown-menu" id="dropdown-${sec.id}">
                            <button class="dropdown-item" onclick="editSection('${secData}')"><i data-lucide="edit-2"></i> Edit</button>
                            <button class="dropdown-item delete" onclick="deleteSection('${sec.id}')"><i data-lucide="trash-2"></i> Delete</button>
                        </div>
                    </div>
                    <button class="view-btn" onclick="viewSection('${sec.id}')">View</button>
                </div>
            `;
            sectionsWrapper.appendChild(card);
        });

        lucide.createIcons();
    }

    function toggleDropdown(event, id) {
        event.stopPropagation();
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu.id !== `dropdown-${id}`) {
                menu.classList.remove('show');
            }
        });
        const dropdown = document.getElementById(`dropdown-${id}`);
        if(dropdown) dropdown.classList.toggle('show');
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.section-card');
        let visibleCount = 0;
        
        cards.forEach(card => {
            const title = card.querySelector('.section-title').textContent.toLowerCase();
            const subject = card.querySelector('.section-subtitle').textContent.toLowerCase();
            
            if (title.includes(term) || subject.includes(term)) {
                card.style.display = 'flex';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        const noMatchMsg = document.getElementById('noMatchMessage');
        if (noMatchMsg) {
            noMatchMsg.style.display = (visibleCount === 0 && cards.length > 0) ? 'flex' : 'none';
        }
    });

    function editSection(encodedData) {
        const sec = JSON.parse(decodeURIComponent(encodedData));
        editingId = sec.id;
        
        document.getElementById('modalTitle').textContent = "Edit Section";
        document.getElementById('secTitle').value = sec.title;
        document.getElementById('secSubject').value = sec.subject;
        document.getElementById('secRoom').value = sec.room;
        document.getElementById('secSemester').value = sec.semester || '1st Sem'; 
         document.getElementById('secSchoolYear').value = sec.school_year || ''; 
        toggleSectionModal();
    }

    async function saveSection() {
        const title = document.getElementById('secTitle').value.trim();
        const subject = document.getElementById('secSubject').value.trim();
        const room = document.getElementById('secRoom').value.trim();
        const semester = document.getElementById('secSemester').value; 
          const school_year = document.getElementById('secSchoolYear').value; 
        const teacher_id = localStorage.getItem('user_id');

        if (!title || !subject || !room || !semester || !school_year) {
            showNotification("Please fill in all fields including Semester!", "error");
            return;
        }

        const sectionData = {
            teacher_id: teacher_id,
            title: title,
            subject: subject,
            room: room,
            semester: semester,
            school_year: school_year
        };

        try {
            if (editingId) {
                const { error } = await supabaseClient
                    .from('sections')
                    .update(sectionData)
                    .eq('id', editingId);
                
                if (error) throw error;
                showNotification("Record updated successfully!");
            } else {
                const { error } = await supabaseClient
                    .from('sections')
                    .insert([sectionData]);
                
                if (error) throw error;
                showNotification("Record saved successfully!");
            }

            loadSections();
            toggleSectionModal();
            document.getElementById('searchInput').value = '';
        } catch (error) {
            console.error("Save error:", error);
            showNotification("Error saving record.", "error");
        }
    }

    async function deleteSection(id) {
        if(confirm("Are you sure you want to delete this record?")) {
            const { error } = await supabaseClient
                .from('sections')
                .delete()
                .eq('id', id);

            if (error) {
                console.error("Delete error:", error);
                showNotification("Error deleting record.", "error");
            } else {
                showNotification("Record deleted.");
                loadSections();
                document.getElementById('searchInput').value = '';
            }
        }
    }

    function viewSection(id) {
        window.location.href = `performance(2).html?id=${id}`;
