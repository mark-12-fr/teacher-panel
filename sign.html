<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="theme-color" content="#3b82f6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #dbeafe 40%, #c7d2fe 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-header {
            padding: 18px 40px
        }

        .auth-header-inner {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .auth-logo {
            width: 42px
        }

        .auth-school-name {
            font-weight: 600;
            font-size: 14px;
            color: #0f172a
        }

        .auth-main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 34px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid #eef2f7;
            box-shadow:
                0 14px 35px rgba(0, 0, 0, .08),
                0 6px 14px rgba(0, 0, 0, .04);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 6px;
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
        }

        .login-subtitle {
            font-size: 13.5px;
            color: #64748b;
            margin-bottom: 18px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #111;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .google-btn:hover {
            background: #f9fafb;
        }

        .divider {
            margin: 18px 0;
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .form-group {
            position: relative;
            margin-top: 16px;
            text-align: left
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            background: #f8fafc;
            font-size: 14px;
            outline: none;
            transition: .2s;
        }

        .form-group label {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #fff;
            padding: 0 6px;
            font-size: 13px;
            color: #64748b;
            pointer-events: none;
            transition: .2s;
        }

        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
            background: #fff;
        }

        .form-group input:focus+label,
        .form-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 11px;
            color: #2563eb;
        }

        .field-msg {
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .field-msg.error {
            color: #dc2626
        }

        .field-msg.success {
            color: #059669
        }

        .strength-meter {
            height: 6px;
            border-radius: 6px;
            background: #e5e7eb;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: .3s;
        }

        .btn-login {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: .25s;
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, .35);
        }

        .login-text {
            margin-top: 16px;
            font-size: 13.5px
        }

        .login-text a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none
        }

        /* TOAST NOTIFICATION STYLES */
        .toast-notification {
            position: fixed;
            top: 24px;
            right: -350px;
            background: #10b981;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            font-size: 14.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999;
        }

        .toast-notification.show {
            right: 24px;
        }

        .toast-notification.error {
            background: #ef4444;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <main class="auth-main">
        <div class="login-card">

            <h2>Create Account</h2>
            <p class="login-subtitle">Sign up to get started</p>

            <button type="button" onclick="loginWithGoogle()" class="google-btn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
                Sign up with Google
            </button>

            <div class="divider">or continue with email</div>

            <form id="signupForm" onsubmit="handleSignUp(event)">

                <div class="form-group">
                    <input type="text" name="full_name" id="full_name" required placeholder=" ">
                    <label>Full Name</label>
                </div>

                <div class="form-group">
                    <input type="email" name="email" id="email" required placeholder=" " onblur="checkEmail()">
                    <label>Email Address</label>
                    <div id="emailMsg" class="field-msg"></div>
                </div>

                <div class="form-group">
                    <input type="password" name="password" id="password" required placeholder=" "
                        oninput="checkStrength();checkMatch();">
                    <label>Password</label>
                    <div class="strength-meter">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>

                <div class="form-group">
                    <input type="password" name="confirm_password" id="confirmPassword" required placeholder=" "
                        oninput="checkMatch()">
                    <label>Confirm Password</label>
                    <div id="matchMsg" class="field-msg"></div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">Create Account</button>
            </form>

            <div class="login-text">
                Already have an account?
                <a href="login.html">Log in</a>
            </div>

        </div>
    </main>

    <div id="toastMessage" class="toast-notification">
        <svg id="toastIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span id="toastText">Account successfully created!</span>
    </div>

    <script>
        
        if (localStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }

        
        const SUPABASE_URL = 'https://njzvuwkepaasnsvuujgx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qenZ1d2tlcGFhc25zdnV1amd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTk5MTgsImV4cCI6MjA5MzE3NTkxOH0.tFh2d3ZIZYMWk-7HHckCbkwbTJ7uQ9onGeTaaUlkeH0';

       
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      
        function showToast(message, isError = false) {
            const toast = document.getElementById("toastMessage");
            const text = document.getElementById("toastText");
            const icon = document.getElementById("toastIcon");

            text.textContent = message;

            if (isError) {
                toast.classList.add("error");
                icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
            } else {
                toast.classList.remove("error");
                icon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
            }

            toast.classList.add("show");

            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        async function loginWithGoogle() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html',
                        queryParams: {
                            prompt: 'select_account'
                        }
                    }
                });

                if (error) throw error;
            } catch (error) {
                console.error("Google login error:", error);
                showToast("Failed to connect to Google", true);
            }
        }

        function checkStrength() {
            const val = document.getElementById("password").value;
            const fill = document.getElementById("strengthFill");

            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = ["#ef4444", "#f59e0b", "#3b82f6", "#10b981"];
            fill.style.width = (score * 25) + "%";
            fill.style.background = colors[score - 1] || "#e5e7eb";
        }

        function checkMatch() {
            const pass = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;
            const msg = document.getElementById("matchMsg");

            if (!confirm) {
                msg.style.display = "none";
                return;
            }
            msg.style.display = "block";

            if (pass === confirm) {
                msg.className = "field-msg success";
                msg.textContent = "Passwords match";
            } else {
                msg.className = "field-msg error";
                msg.textContent = "Passwords do not match";
            }
        }

        let emailExists = false;

        async function checkEmail() {
            const email = document.getElementById("email").value;
            const msg = document.getElementById("emailMsg");
            if (!email) return;

            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('email')
                    .eq('email', email);

                msg.style.display = "block";

                if (data && data.length > 0) {
                    emailExists = true;
                    msg.className = "field-msg error";
                    msg.textContent = `This account ${email} is already registered`;
                } else {
                    emailExists = false;
                    msg.className = "field-msg success";
                    msg.textContent = "Email is available";
                }
            } catch (error) {
                console.error("Error checking email:", error);
            }
        }

        async function handleSignUp(event) {
            event.preventDefault();

            if (emailExists) {
                showToast("This email is already registered.", true);
                return false;
            }

            const pass = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;

            if (pass !== confirm) {
                showToast("Passwords do not match.", true);
                return false;
            }

            const fullName = document.getElementById("full_name").value;
            const email = document.getElementById("email").value;
            const submitBtn = document.getElementById("submitBtn");

            submitBtn.textContent = "Creating Account...";
            submitBtn.disabled = true;

            try {
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: pass,
                    options: {
                        data: {
                            full_name: fullName
                        }
                    }
                });

                if (authError) {
                    showToast(authError.message || "Failed to create account", true);
                    submitBtn.textContent = "Create Account";
                    submitBtn.disabled = false;
                    return;
                }

                if (authData.user) {
                    const { error: profileError } = await supabaseClient.from('profiles').upsert([
                        { id: authData.user.id, full_name: fullName, email: email }
                    ]);

                    if (profileError) {
                        console.error("Profile insert warning:", profileError);
                    }

                    if (authData.session) {
                        localStorage.setItem('access_token', authData.session.access_token);
                    }
                    localStorage.setItem('user_id', authData.user.id);
                    localStorage.setItem('cached_user_name', fullName);

                    showToast("Account successfully created! Redirecting to Dashboard...");

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                }

            } catch (error) {
                console.error("Signup error:", error);
                showToast("An unexpected error occurred.", true);
                submitBtn.textContent = "Create Account";
                submitBtn.disabled = false;
            }
        }
    </script>

</body>

</html>
