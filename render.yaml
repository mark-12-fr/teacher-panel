# Render Blueprint for the AcadTrack Teacher API (FastAPI backend in /backend).
# Create it on Render via:  New +  →  Blueprint  →  pick this repo.
# Secrets (sync: false) are entered in the Render dashboard, not committed here.
services:
  - type: web
    name: teacher-panel-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/ping
    envVars:
      # Pin Python so pydantic-core (Rust) and greenlet (C++) install from
      # prebuilt cp312 wheels instead of compiling. PYTHON_VERSION is the
      # highest-precedence signal Render reads — a bare-version runtime.txt is
      # NOT honored (that format is for .python-version), so Render was falling
      # back to 3.14 and failing the build.
      - key: PYTHON_VERSION
        value: "3.12.9"

      - key: DATABASE_URL
        sync: false

      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: SUPABASE_URL
        sync: false

      - key: CORS_ORIGINS
        value: "https://acadtrack.asia,https://www.acadtrack.asia,https://teacher-panel-phi.vercel.app,https://teacher-panel-mjrvertex-7104s-projects.vercel.app"

      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: "mailto:mjrvertex@gmail.com"
